<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>지도 맛집 기록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* SVG 클릭 하이라이트 */
      .map-svg [data-province] { cursor: pointer; }
      .map-svg [data-district] { cursor: pointer; }
      .map-svg .dimmed { opacity: 0.12; pointer-events: none; }
      .map-svg .active-province { opacity: 1; }
      .map-svg [data-province]:active,
      .map-svg [data-district]:active { opacity: 0.75; }
      /* iOS safe area */
      .safe-top { padding-top: env(safe-area-inset-top); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <header class="safe-top fixed inset-x-0 top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
      <div class="mx-auto flex max-w-md items-center gap-2 px-4 py-3">
        <button
          id="backBtn"
          class="hidden h-11 shrink-0 rounded-xl border border-slate-200 bg-white px-3 text-sm font-semibold text-slate-800 active:bg-slate-100"
          type="button"
        >
          전체 지도
        </button>
        <div class="min-w-0 flex-1">
          <div class="truncate text-base font-bold" id="titleText">전국 지도</div>
          <div class="truncate text-xs text-slate-500" id="subtitleText">시/도를 탭해 확대하세요</div>
        </div>
      </div>
    </header>

    <main class="mx-auto max-w-md px-4 pb-28 pt-20">
      <section class="rounded-2xl border border-slate-200 bg-white shadow-sm">
        <div class="flex items-center justify-between gap-2 border-b border-slate-100 px-4 py-3">
          <div class="text-sm font-semibold text-slate-800">지도</div>
          <div class="text-xs text-slate-500" id="hintText">시/도 탭 → 구/군 탭 → 기록 저장</div>
        </div>
        <div class="relative overflow-hidden p-3">
          <div
            id="mapViewport"
            class="relative mx-auto w-full max-w-md overflow-hidden rounded-xl bg-slate-50"
            style="aspect-ratio: 1 / 1.15"
          >
            <div id="mapLoading" class="absolute inset-0 grid place-items-center text-sm text-slate-500">
              지도를 불러오는 중…
            </div>
            <div id="mapRoot" class="absolute inset-0"></div>
          </div>
          <div class="mt-3 rounded-xl bg-slate-50 px-3 py-2 text-xs text-slate-600">
            팁: 파일을 더블클릭으로 열면 로딩이 막힐 수 있어요. 이 경우 로컬 서버로 실행하세요 (README 참고).
          </div>
        </div>
      </section>

      <section class="mt-4">
        <div class="mb-2 flex items-end justify-between">
          <div>
            <div class="text-sm font-bold text-slate-900">기록</div>
            <div class="text-xs text-slate-500" id="feedTitle">구/군을 선택하면 해당 기록이 표시돼요</div>
          </div>
          <button
            id="clearDistrictBtn"
            type="button"
            class="hidden h-10 rounded-xl border border-slate-200 bg-white px-3 text-xs font-semibold text-slate-700 active:bg-slate-100"
          >
            선택 해제
          </button>
        </div>

        <div id="feed" class="grid gap-3"></div>
      </section>

      <footer class="mt-10 text-center text-xs text-slate-400">
        지도 데이터: Wikimedia Commons (CC BY-SA 3.0 / 기타 표기). 저장: localStorage.
      </footer>
    </main>

    <!-- Bottom sheet -->
    <div id="sheetBackdrop" class="fixed inset-0 z-40 hidden bg-black/40"></div>
    <section
      id="sheet"
      class="safe-bottom fixed inset-x-0 bottom-0 z-50 hidden max-w-md rounded-t-3xl border border-slate-200 bg-white shadow-2xl"
      style="left: 50%; transform: translateX(-50%); width: min(100%, 28rem);"
      aria-modal="true"
      role="dialog"
    >
      <div class="px-4 pb-4 pt-3">
        <div class="mx-auto mb-2 h-1.5 w-10 rounded-full bg-slate-200"></div>
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="truncate text-sm font-bold text-slate-900" id="sheetHeading">구 선택</div>
            <div class="truncate text-xs text-slate-500" id="sheetSubheading">기록을 남겨보세요</div>
          </div>
          <button
            id="sheetCloseBtn"
            type="button"
            class="h-10 w-10 rounded-xl border border-slate-200 bg-white text-slate-700 active:bg-slate-100"
            aria-label="닫기"
          >
            ✕
          </button>
        </div>

        <form id="entryForm" class="mt-3 grid gap-3">
          <input type="hidden" id="provinceId" />
          <input type="hidden" id="provinceName" />
          <input type="hidden" id="districtId" />
          <input type="hidden" id="districtName" />

          <label class="flex items-center justify-between rounded-2xl border border-slate-200 px-4 py-3">
            <span class="text-sm font-semibold text-slate-800">방문 완료</span>
            <input id="visited" type="checkbox" class="h-6 w-6 accent-slate-900" />
          </label>

          <label class="grid gap-1">
            <span class="text-sm font-semibold text-slate-800">맛집 이름</span>
            <input
              id="placeName"
              type="text"
              inputmode="text"
              placeholder="예: OO칼국수"
              class="h-12 rounded-2xl border border-slate-200 bg-white px-4 text-base outline-none focus:border-slate-400"
              required
            />
          </label>

          <label class="grid gap-1">
            <span class="text-sm font-semibold text-slate-800">상세 내용</span>
            <textarea
              id="notes"
              rows="4"
              placeholder="메뉴/가격/대기/팁 등을 적어두면 좋아요"
              class="min-h-[96px] resize-none rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base outline-none focus:border-slate-400"
            ></textarea>
          </label>

          <button
            id="saveBtn"
            type="submit"
            class="h-12 rounded-2xl bg-slate-900 text-base font-bold text-white active:bg-slate-800"
          >
            저장하기
          </button>
        </form>
      </div>
    </section>

    <!-- Toast -->
    <div
      id="toast"
      class="pointer-events-none fixed left-1/2 top-16 z-[60] hidden -translate-x-1/2 rounded-2xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-lg"
    >
      저장했어요
    </div>

    <script defer src="./app.js"></script>
  </body>
</html>
